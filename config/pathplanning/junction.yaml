# ================  SCENARIO  ================
SIMULATION_NAME: "junction"
LOG_RESULTS: false        # if true, Simulator::log_results() runs (convergence metrics + result logging)
SCENARIO: junction        # random | circle | junction | junction_twoway | trigrid | file (with SCENARIO_FILE)
TIMESTEPS_BEFORE_NEW_ROBOTS_SPAWNED: 50          # timesteps between robot spawns (@)
OBSTACLE_FILE: imgs/obstacles/junction.png   # path to obstacle image (black = obstacle, white = free space)
NUM_ROBOTS: 20            #
COMMUNICATION_RADIUS: 10  # meters, robot comms radius
RNG_SEED: 1               # Random Number Generator seed
COMMS_FAILURE_RATE: 0.0   # proportion [0,1] of robots that fail to communicate

# ================  WORLD / ROBOT  ================
WORLD_SZ: 100             # world size (square) in meters
TIMESTEP: 0.1             # seconds per simulation timestep
MAX_TIME: -1              # Max timesteps for simulation (-1 = no limit)
SIM_MODE: 0               # 0: Paused, 1: Running
ROBOT_MODEL: bus          # bus | sphere | robot (@)

# ================  DISPLAY  ================
DISPLAY: 1                # 0: no graphical display, 1: graphical display
SCREEN_SZ: 800            # Size of display window (pixels)
DRAW_INTERROBOT: 1        # Draw inter-robot factors (communication links)
DRAW_PATH: 0              # Draw robot planned paths
DRAW_TRAJ: 0              # Draw robot executed trajectories
MAX_TRAJ_LEN: 100         # Maximum length of executed trajectory to draw (-1 = no limit)
DRAW_WAYPOINTS: 0         # Draw robot waypoints

# ================  PROBLEM-SPECIFIC SETUP  ================
# Factorgraph_layers in each robot's GBP stack.
# Each layer in the factor graph represents a sub-problem in the overall multi-robot problem.
FACTORGRAPH_LAYERS:
  # PLANNING layer: path-planning settings and factor sigmas.
  - name: Planning
    type: planning
    params:
      T_HORIZON: 1.5                  # [s] Time horizon for planning (how far into the future to plan) (@)
      ROBOT_RADIUS: 1.0               # [m] Robot radius. For 'bus' models, this is the width and half the length of the bus.
      MAX_SPEED: 2                    # [m/s] Maximum speed of robot
      TURNING_RADIUS: 1.0             # [m] Turning radius of robot with unicycle model
      # [ADVANCED]:      GBP Factor strengths
      SIGMA_VARIABLE_HORIZON: 0.01    # Prior on robot's horizon in its planned path. (higher means horizon is more flexible in planning)
      SIGMA_FACTOR_DYNAMICS: 0.1      # Dynamics factor (robot's constant-velocity motion model)
      SIGMA_FACTOR_UNICYCLE: 0.001    # Unicycle factor (robot's unicycle motion model)
      SIGMA_FACTOR_INTERROBOT: 0.01   # Inter-robot factor (robots should not collide)
      SIGMA_FACTOR_OBSTACLE: 0.01     # Obstacle factor (robots should not collide with obstacles)

# ================  ADVANCED — GBP solver (defaults in Globals.cpp)  ================
# Number of External GBP iterations per timestep.
# Number of Internal GBP iterations is set in Globals.cpp (default 2).
# Total GBP iterations per timestep = NUM_ITERS * NUM_INTERNAL_ITERS.
NUM_ITERS: 2